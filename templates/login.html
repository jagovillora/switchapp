<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Switch Select</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070f;--card:#0e0e1a;--border:#1a1a2e;--red:#e4000f;--red2:#ff2d3a;--text:#eef0f8;--muted:#555570}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:48px 40px;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.logo{text-align:center;margin-bottom:40px}
.joy-wrap{display:inline-flex;align-items:center;gap:8px;margin-bottom:16px}
.joy{width:26px;height:44px;border-radius:13px;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700}
.joy.l{background:var(--red);color:rgba(255,255,255,.6)}
.joy.r{background:#1e8fc0;color:rgba(255,255,255,.6)}
.screen{width:52px;height:38px;background:#060610;border:1.5px solid #2a2a40;
  border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px}
h1{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;color:var(--text)}
.sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:4px;text-transform:uppercase}
.flash{background:rgba(228,0,15,.08);border:1px solid rgba(228,0,15,.25);color:#ff7070;
  border-radius:4px;padding:10px 14px;font-size:13px;margin-bottom:20px}
label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px}
input{width:100%;background:#060610;border:1px solid var(--border);border-radius:4px;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;
  padding:13px 15px;outline:none;transition:border-color .2s;margin-bottom:20px}
input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(228,0,15,.08)}
.btn{width:100%;background:var(--red);color:#fff;border:none;border-radius:4px;
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:3px;
  padding:15px;cursor:pointer;text-transform:uppercase;transition:all .2s;position:relative;overflow:hidden}
.btn:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 8px 28px rgba(228,0,15,.35)}
.btn:active{transform:translateY(0)}
.sep{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:11px;letter-spacing:2px}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;padding:12px;
  cursor:pointer;text-decoration:none;transition:all .2s}
.btn-google:hover{border-color:#444466;background:rgba(255,255,255,.03)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="joy-wrap">
        <div class="joy l">L</div>
        <div class="screen">🎮</div>
        <div class="joy r">R</div>
      </div>
      <h1>Switch Select</h1>
      <div class="sub">Elige tus juegos</div>
    </div>
    {% with m=get_flashed_messages(with_categories=true) %}
      {% for _,msg in m %}<div class="flash">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="POST">
      <label>Usuario</label>
      <input type="text" name="username" autocomplete="username" required autofocus>
      <label>Contraseña</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit" class="btn">Entrar →</button>
    </form>
    {% if google_enabled %}
    <div class="sep">o</div>
    <a href="/auth/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.2 30.2 0 24 0 14.6 0 6.6 5.4 2.8 13.3l7.8 6C12.4 13.1 17.8 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4.1 7.1-10.1 7.1-17z"/>
        <path fill="#FBBC05" d="M10.6 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.1-6.1z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.8l-8.1 6.1C6.5 42.5 14.6 48 24 48z"/>
      </svg>
      Continuar con Google (admin)
    </a>
    {% endif %}
  </div>
</div>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,P=[];
const resize=()=>{W=c.width=innerWidth;H=c.height=innerHeight};
resize();addEventListener('resize',resize);
for(let i=0;i<55;i++)P.push({x:Math.random()*W,y:Math.random()*H,
  vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.8+.4,a:Math.random()*.6+.1});
(function draw(){
  x.clearRect(0,0,W,H);
  P.forEach(p=>{
    p.x=(p.x+p.vx+W)%W; p.y=(p.y+p.vy+H)%H;
    x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);
    x.fillStyle=`rgba(228,0,15,${p.a})`;x.fill();
  });
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
