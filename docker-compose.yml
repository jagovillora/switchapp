version: '3.8'

services:
  switchapp:
    build: .
    container_name: switch-selector
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # La base de datos persiste aquí aunque reinicies el contenedor
      - ./data:/data
    environment:
      - PORT=5000
      # Cambia esto por una cadena aleatoria larga
      - SECRET_KEY=cambia_esto_por_algo_aleatorio_largo_2025
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
